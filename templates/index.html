<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>벨런스게임</title>
</head>
<body>
    <h1>Blance Game Comunity</h1>
    {% if session.get('username')%}
        <p>{{session['username']}}님 환영합니다.</p>
        <a href="/logout">로그아웃</a>
    {% else %}
        <a href="/login">로그인</a>
        <a href="/register">회원가입</a>
    {% endif %}

    <a href="/write">
        <button>글 작성하기</button>
    </a>
    <hr>
    <h2>게시글 목록</h2>

    {% for post in posts %}
        <div style="border: 1px solid #ccc; margin:10px; padding: 10px;">
            <h3>{{post["title"]}}</h3>
            <p>
                A: {{post["option_a"]}} {{post["vote_a"]}}
                <a href="/vote/{{post['id']}}/a">투표</a>
            </p>
            <p>
                B: {{post["option_b"]}} {{post["vote_b"]}}
                <a href="/vote/{{post['id']}}/b">투표</a>
            </p>

            <a href="/edit/{{post['id']}}">수정</a>
            <form method="POST" action="/delete/{{post['id']}}" style="display:inline;">
                <button type="submit">삭제</button>
            </form>
        </div>
    {%endfor%}
</body>
</html>
